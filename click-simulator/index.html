<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CoinSprite Click Simulator</title>
  <link rel="stylesheet" href="/click-simulator/style.css">
  <script src="/click-simulator/app.js" defer></script>
</head>
<body>
  <main id="game" class="game-shell" aria-label="Click Simulator game area">
    <section class="hud" aria-live="polite">
      <div>
        <p class="eyebrow">CoinSprite</p>
        <h1>Click Simulator</h1>
      </div>
      <div class="currency-card">
        <span class="currency-label">Clicks</span>
        <strong id="clickCount">0</strong>
      </div>
    </section>

    <section class="center-card">
      <p class="hint">Click anywhere</p>
      <p class="subhint">Each click gives +1. Critical clicks have a 0.1% chance to give +10.</p>
      <p id="statusText" class="status-text">Loading your clicks...</p>
    </section>

    <div id="popupLayer" class="popup-layer" aria-hidden="true"></div>
  </main>
</body>
</html>
